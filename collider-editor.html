<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Collider Editor — Khaos City</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#eee;font-family:monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* ── TOOLBAR ── */
#toolbar{
  height:48px;background:#1a1a1a;border-bottom:1px solid #333;
  display:flex;align-items:center;padding:0 12px;gap:10px;flex-shrink:0;
}
.tb-title{font-size:14px;font-weight:bold;color:#ff4444;letter-spacing:2px;text-transform:uppercase}
.tb-btn{
  background:#2a2a2a;border:1px solid #444;color:#ddd;padding:5px 14px;
  border-radius:6px;cursor:pointer;font-family:monospace;font-size:12px;
  transition:background .15s,border-color .15s;
}
.tb-btn:hover{background:#3a3a3a;border-color:#666}
.tb-btn.danger{border-color:#ff4444;color:#ff4444}
.tb-btn.danger:hover{background:#3a1010}
.tb-btn.primary{background:#1a3a1a;border-color:#3fe89a;color:#3fe89a}
.tb-btn.primary:hover{background:#2a4a2a}
.tb-sep{width:1px;height:28px;background:#333;margin:0 4px}
.tb-info{font-size:11px;color:#666;margin-left:auto}
.tb-hint{font-size:11px;color:#555;padding:4px 10px;background:#161616;border-radius:4px;border:1px solid #2a2a2a}

/* ── MAIN AREA ── */
#main{flex:1;display:flex;overflow:hidden}

/* ── VIEWPORT ── */
#viewport{
  flex:1;overflow:hidden;position:relative;cursor:crosshair;
  background:#0d0d0d;
}
#canvas-wrap{
  position:absolute;transform-origin:0 0;
}
#map-img{display:block;image-rendering:pixelated;user-select:none;pointer-events:none}

/* ── COLLIDER OVERLAYS ── */
.collider{
  position:absolute;
  background:rgba(255,40,40,0.35);
  border:2px solid rgba(255,60,60,0.9);
  box-shadow:inset 0 0 0 1px rgba(255,120,120,0.3), 0 0 8px rgba(255,40,40,0.4);
  cursor:move;
  user-select:none;
  border-radius:2px;
}
.collider.selected{
  background:rgba(255,160,40,0.4);
  border-color:rgba(255,180,40,1);
  box-shadow:inset 0 0 0 1px rgba(255,220,100,0.4), 0 0 14px rgba(255,160,40,0.6);
}
.collider .lbl{
  position:absolute;top:2px;left:3px;
  font-size:9px;color:rgba(255,200,200,0.9);
  pointer-events:none;line-height:1;white-space:nowrap;text-shadow:0 1px 3px #000;
}
/* 8 resize handles */
.handle{
  position:absolute;width:10px;height:10px;
  background:#ff4;border:1px solid #000;border-radius:2px;
  pointer-events:all;
}
.handle.tl{top:-5px;left:-5px;cursor:nw-resize}
.handle.tc{top:-5px;left:calc(50% - 5px);cursor:n-resize}
.handle.tr{top:-5px;right:-5px;cursor:ne-resize}
.handle.ml{top:calc(50% - 5px);left:-5px;cursor:w-resize}
.handle.mr{top:calc(50% - 5px);right:-5px;cursor:e-resize}
.handle.bl{bottom:-5px;left:-5px;cursor:sw-resize}
.handle.bc{bottom:-5px;left:calc(50% - 5px);cursor:s-resize}
.handle.br{bottom:-5px;right:-5px;cursor:se-resize}

/* ── SIDEBAR ── */
#sidebar{
  width:260px;background:#161616;border-left:1px solid #2a2a2a;
  display:flex;flex-direction:column;overflow:hidden;
}
#sidebar-hdr{padding:10px 12px;border-bottom:1px solid #2a2a2a;font-size:11px;color:#888;letter-spacing:1px;text-transform:uppercase}
#zone-list{flex:1;overflow-y:auto;padding:6px}
.zone-item{
  display:flex;align-items:center;gap:6px;padding:5px 8px;
  border-radius:5px;cursor:pointer;font-size:11px;
  border:1px solid transparent;margin-bottom:3px;
  transition:background .1s;
}
.zone-item:hover{background:#222}
.zone-item.selected{background:#2a1a1a;border-color:#ff4444}
.zone-dot{width:8px;height:8px;background:#ff4444;border-radius:1px;flex-shrink:0}
.zone-dot.selected{background:#ffaa00}
.zone-coords{font-size:10px;color:#555;margin-left:auto;white-space:nowrap}
.zone-del{background:none;border:none;color:#444;cursor:pointer;font-size:13px;padding:0 2px;transition:color .1s}
.zone-del:hover{color:#ff4444}

#export-area{
  border-top:1px solid #2a2a2a;padding:10px;
}
#export-out{
  width:100%;height:120px;background:#0d0d0d;border:1px solid #2a2a2a;
  color:#3fe89a;font-family:monospace;font-size:10px;padding:8px;
  border-radius:5px;resize:none;
}
#coords-display{
  padding:8px 12px;background:#111;border-top:1px solid #222;
  font-size:10px;color:#555;line-height:1.8;
}
#coords-display span{color:#aaa}
</style>
</head>
<body>

<div id="toolbar">
  <div class="tb-title">⬛ Collider Editor</div>
  <div class="tb-sep"></div>
  <button class="tb-btn primary" id="btn-add">+ Aggiungi Zona</button>
  <button class="tb-btn danger" id="btn-del-sel">🗑 Elimina Selezionata</button>
  <button class="tb-btn" id="btn-clear">Pulisci tutto</button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-load-default">Carica default</button>
  <button class="tb-btn primary" id="btn-export">📋 Esporta JSON</button>
  <div class="tb-sep"></div>
  <div class="tb-hint">Click mappa = nuova zona · Drag = sposta · Handle = ridimensiona · Scroll = zoom · Del = elimina</div>
</div>

<div id="main">
  <div id="viewport" id="viewport">
    <div id="canvas-wrap">
      <img id="map-img" src="assets/mappa.png" draggable="false"/>
      <div id="colliders-layer" style="position:absolute;inset:0;pointer-events:none"></div>
    </div>
  </div>

  <div id="sidebar">
    <div id="sidebar-hdr">Zone collider (<span id="zone-count">0</span>)</div>
    <div id="zone-list"></div>
    <div id="coords-display">
      X: <span id="cd-x">—</span> &nbsp; Y: <span id="cd-y">—</span><br>
      W: <span id="cd-w">—</span> &nbsp; H: <span id="cd-h">—</span>
    </div>
    <div id="export-area">
      <button class="tb-btn primary" style="width:100%;margin-bottom:6px" id="btn-export2">📋 Copia codice JS</button>
      <textarea id="export-out" readonly placeholder="Clicca 'Copia codice JS' per generare..."></textarea>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
const MAP_W = 1400, MAP_H = 900;
let cam = { x: 0, y: 0, scale: 1 };
let zones = [];
let selectedId = null;
let idCounter = 0;

// Interaction state
let dragState = null; // { type: 'move'|'resize'|'cam'|'create', ... }

// ══════════════════════════════════════════
// DEFAULT ZONES (from game)
// ══════════════════════════════════════════
const DEFAULT_ZONES = [
  { label:'Strada V. Centrale', x:45, y:0,  w:9,  h:100 },
  { label:'Strada O. Centrale', x:0,  y:43, w:100,h:14  },
  { label:'Mud strada O 1',     x:1,  y:16, w:43, h:7   },
  { label:'Mud strada O 2',     x:1,  y:28, w:43, h:6   },
  { label:'Mud strada V 1',     x:14, y:1,  w:7,  h:42  },
  { label:'Mud strada V 2',     x:30, y:1,  w:7,  h:42  },
  { label:'Iron strada O 1',    x:49, y:20, w:50, h:6   },
  { label:'Iron strada O 2',    x:49, y:33, w:50, h:5   },
  { label:'Iron strada V 1',    x:76, y:1,  w:7,  h:42  },
  { label:'Iron strada V 2',    x:89, y:1,  w:9,  h:42  },
  { label:'Sol strada O 1',     x:1,  y:62, w:43, h:6   },
  { label:'Sol strada O 2',     x:1,  y:76, w:43, h:6   },
  { label:'Sol strada V 1',     x:14, y:57, w:6,  h:41  },
  { label:'Sol strada V 2',     x:30, y:57, w:6,  h:41  },
  { label:'Neon strada O 1',    x:49, y:62, w:50, h:5   },
  { label:'Neon strada O 2',    x:49, y:76, w:50, h:6   },
  { label:'Neon strada V 1',    x:76, y:57, w:7,  h:41  },
  { label:'Neon strada V 2',    x:89, y:57, w:9,  h:41  },
  { label:'Piazza Fontana',     x:40, y:37, w:19, h:22  },
];

// ══════════════════════════════════════════
// CAMERA
// ══════════════════════════════════════════
function applyCamera(){
  const wrap = document.getElementById('canvas-wrap');
  wrap.style.transform = `translate(${cam.x}px,${cam.y}px) scale(${cam.scale})`;
}

function centerCamera(){
  const vp = document.getElementById('viewport');
  const vw = vp.clientWidth, vh = vp.clientHeight;
  const s = Math.min(vw/MAP_W, vh/MAP_H) * 0.97;
  cam.scale = s;
  cam.x = (vw - MAP_W*s)/2;
  cam.y = (vh - MAP_H*s)/2;
  applyCamera();
}

// ══════════════════════════════════════════
// ZONE MANAGEMENT
// ══════════════════════════════════════════
function addZone(z){
  const id = ++idCounter;
  zones.push({ id, label: z.label||`zona_${id}`, x:z.x, y:z.y, w:z.w, h:z.h });
  renderAllZones();
  selectZone(id);
  updateSidebar();
}

function deleteZone(id){
  zones = zones.filter(z=>z.id!==id);
  if(selectedId===id) selectedId=null;
  renderAllZones();
  updateSidebar();
  updateCoordsDisplay(null);
}

function selectZone(id){
  selectedId = id;
  document.querySelectorAll('.collider').forEach(el=>{
    el.classList.toggle('selected', el.dataset.id==id);
    el.querySelectorAll('.handle').forEach(h=>h.style.display = el.dataset.id==id?'block':'none');
  });
  document.querySelectorAll('.zone-item').forEach(el=>{
    el.classList.toggle('selected', el.dataset.id==id);
    el.querySelector('.zone-dot').classList.toggle('selected', el.dataset.id==id);
  });
  const z = zones.find(z=>z.id===id);
  if(z) updateCoordsDisplay(z);
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function renderAllZones(){
  const layer = document.getElementById('colliders-layer');
  layer.innerHTML = '';
  for(const z of zones){
    const el = document.createElement('div');
    el.className = 'collider' + (z.id===selectedId?' selected':'');
    el.dataset.id = z.id;
    el.style.cssText = `left:${z.x}%;top:${z.y}%;width:${z.w}%;height:${z.h}%;pointer-events:all`;

    // Label
    const lbl = document.createElement('div');
    lbl.className='lbl';
    lbl.textContent = z.label;
    el.appendChild(lbl);

    // Resize handles (hidden unless selected)
    const handles = ['tl','tc','tr','ml','mr','bl','bc','br'];
    handles.forEach(h=>{
      const hEl = document.createElement('div');
      hEl.className = `handle ${h}`;
      hEl.dataset.handle = h;
      hEl.style.display = z.id===selectedId ? 'block':'none';
      hEl.addEventListener('mousedown', e=>{ e.stopPropagation(); startResize(e, z.id, h); });
      el.appendChild(hEl);
    });

    el.addEventListener('mousedown', e=>{ e.stopPropagation(); startMove(e, z.id); });
    layer.appendChild(el);
  }
}

function rerenderZone(id){
  const z = zones.find(z=>z.id===id);
  if(!z) return;
  const el = document.querySelector(`.collider[data-id="${id}"]`);
  if(!el) return;
  el.style.left   = z.x+'%';
  el.style.top    = z.y+'%';
  el.style.width  = z.w+'%';
  el.style.height = z.h+'%';
  updateCoordsDisplay(z);
  updateSidebarItem(id);
}

function updateSidebar(){
  document.getElementById('zone-count').textContent = zones.length;
  const list = document.getElementById('zone-list');
  list.innerHTML = zones.map(z=>`
    <div class="zone-item ${z.id===selectedId?'selected':''}" data-id="${z.id}" onclick="selectZone(${z.id})">
      <div class="zone-dot ${z.id===selectedId?'selected':''}"></div>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${z.label}</span>
      <span class="zone-coords">${Math.round(z.x)},${Math.round(z.y)}</span>
      <button class="zone-del" onclick="event.stopPropagation();deleteZone(${z.id})">✕</button>
    </div>
  `).join('');
}

function updateSidebarItem(id){
  const z = zones.find(z=>z.id===id);
  if(!z) return;
  const el = document.querySelector(`.zone-item[data-id="${id}"]`);
  if(el){
    el.querySelector('.zone-coords').textContent = `${Math.round(z.x)},${Math.round(z.y)}`;
  }
}

function updateCoordsDisplay(z){
  document.getElementById('cd-x').textContent = z ? z.x.toFixed(1) : '—';
  document.getElementById('cd-y').textContent = z ? z.y.toFixed(1) : '—';
  document.getElementById('cd-w').textContent = z ? z.w.toFixed(1) : '—';
  document.getElementById('cd-h').textContent = z ? z.h.toFixed(1) : '—';
}

// ══════════════════════════════════════════
// INTERACTION
// ══════════════════════════════════════════
function clientToMap(cx, cy){
  const vp = document.getElementById('viewport');
  const rect = vp.getBoundingClientRect();
  const mx = (cx - rect.left - cam.x) / cam.scale;
  const my = (cy - rect.top  - cam.y) / cam.scale;
  return { x: (mx/MAP_W)*100, y: (my/MAP_H)*100 };
}

function startMove(e, id){
  selectZone(id);
  const z = zones.find(z=>z.id===id);
  const mp = clientToMap(e.clientX, e.clientY);
  dragState = { type:'move', id, ox:z.x, oy:z.y, sx:mp.x, sy:mp.y };
  e.preventDefault();
}

function startResize(e, id, handle){
  selectZone(id);
  const z = zones.find(z=>z.id===id);
  const mp = clientToMap(e.clientX, e.clientY);
  dragState = { type:'resize', id, handle,
    ox:z.x, oy:z.y, ow:z.w, oh:z.h,
    sx:mp.x, sy:mp.y };
  e.preventDefault();
}

const vp = document.getElementById('viewport');

vp.addEventListener('mousedown', e=>{
  if(dragState) return;
  if(e.target.closest('.collider')) return;
  if(e.button===1 || e.button===2 || e.altKey){
    // Pan
    dragState = { type:'cam', sx:e.clientX, sy:e.clientY, cx:cam.x, cy:cam.y };
  } else if(e.button===0){
    // Create new zone
    const mp = clientToMap(e.clientX, e.clientY);
    dragState = { type:'create', sx:mp.x, sy:mp.y, cx:e.clientX, cy:e.clientY };
    // Show preview div
    const preview = document.createElement('div');
    preview.id='create-preview';
    preview.style.cssText=`position:absolute;background:rgba(255,60,60,0.25);border:2px dashed rgba(255,80,80,0.8);pointer-events:none;left:${mp.x}%;top:${mp.y}%;width:0;height:0`;
    document.getElementById('colliders-layer').appendChild(preview);
  }
  e.preventDefault();
});

window.addEventListener('mousemove', e=>{
  if(!dragState) return;
  const mp = clientToMap(e.clientX, e.clientY);

  if(dragState.type==='cam'){
    cam.x = dragState.cx + (e.clientX - dragState.sx);
    cam.y = dragState.cy + (e.clientY - dragState.sy);
    applyCamera();
  }
  else if(dragState.type==='move'){
    const z = zones.find(z=>z.id===dragState.id);
    z.x = Math.max(0, Math.min(100-z.w, dragState.ox + (mp.x - dragState.sx)));
    z.y = Math.max(0, Math.min(100-z.h, dragState.oy + (mp.y - dragState.sy)));
    rerenderZone(z.id);
  }
  else if(dragState.type==='resize'){
    const z = zones.find(z=>z.id===dragState.id);
    const dx = mp.x - dragState.sx;
    const dy = mp.y - dragState.sy;
    const h = dragState.handle;
    let nx=dragState.ox, ny=dragState.oy, nw=dragState.ow, nh=dragState.oh;
    if(h.includes('l')){ nx=dragState.ox+dx; nw=dragState.ow-dx; }
    if(h.includes('r')){ nw=dragState.ow+dx; }
    if(h.includes('t')){ ny=dragState.oy+dy; nh=dragState.oh-dy; }
    if(h.includes('b')){ nh=dragState.oh+dy; }
    if(nw<1) nw=1; if(nh<0.5) nh=0.5;
    z.x=Math.max(0,nx); z.y=Math.max(0,ny); z.w=nw; z.h=nh;
    rerenderZone(z.id);
  }
  else if(dragState.type==='create'){
    const sx=dragState.sx, sy=dragState.sy;
    const ex=mp.x, ey=mp.y;
    const rx=Math.min(sx,ex), ry=Math.min(sy,ey);
    const rw=Math.abs(ex-sx), rh=Math.abs(ey-sy);
    const p = document.getElementById('create-preview');
    if(p){ p.style.left=rx+'%'; p.style.top=ry+'%'; p.style.width=rw+'%'; p.style.height=rh+'%'; }
  }
});

window.addEventListener('mouseup', e=>{
  if(!dragState) return;
  if(dragState.type==='create'){
    const mp = clientToMap(e.clientX, e.clientY);
    const sx=dragState.sx, sy=dragState.sy;
    const rx=Math.min(sx,mp.x), ry=Math.min(sy,mp.y);
    const rw=Math.abs(mp.x-sx), rh=Math.abs(mp.y-sy);
    const p = document.getElementById('create-preview');
    if(p) p.remove();
    if(rw>0.5 && rh>0.3){
      addZone({ x:parseFloat(rx.toFixed(2)), y:parseFloat(ry.toFixed(2)), w:parseFloat(rw.toFixed(2)), h:parseFloat(rh.toFixed(2)) });
    }
  }
  dragState = null;
});

vp.addEventListener('wheel', e=>{
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.08 : 0.08;
  const newScale = Math.max(0.2, Math.min(6, cam.scale+delta));
  const rect = vp.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  cam.x = mx - (mx - cam.x)*(newScale/cam.scale);
  cam.y = my - (my - cam.y)*(newScale/cam.scale);
  cam.scale = newScale;
  applyCamera();
},{passive:false});

// ══════════════════════════════════════════
// BUTTONS
// ══════════════════════════════════════════
document.getElementById('btn-add').onclick = ()=>{
  addZone({ x:10, y:10, w:20, h:10 });
};

document.getElementById('btn-del-sel').onclick = ()=>{
  if(selectedId) deleteZone(selectedId);
};

document.getElementById('btn-clear').onclick = ()=>{
  if(!confirm('Eliminare tutte le zone?')) return;
  zones=[]; selectedId=null;
  renderAllZones(); updateSidebar(); updateCoordsDisplay(null);
};

document.getElementById('btn-load-default').onclick = ()=>{
  if(zones.length && !confirm('Sovrascrivere le zone esistenti?')) return;
  zones=[]; idCounter=0;
  DEFAULT_ZONES.forEach(z=>{ const id=++idCounter; zones.push({id,...z}); });
  selectedId=null;
  renderAllZones(); updateSidebar(); updateCoordsDisplay(null);
};

function buildExport(){
  const lines = zones.map(z=>
    `  { label:'${z.label}', x:${z.x.toFixed(1)}, y:${z.y.toFixed(1)}, w:${z.w.toFixed(1)}, h:${z.h.toFixed(1)} },`
  ).join('\n');
  return `const WALKABLE_ZONES = [\n${lines}\n];`;
}

document.getElementById('btn-export').onclick =
document.getElementById('btn-export2').onclick = ()=>{
  const code = buildExport();
  document.getElementById('export-out').value = code;
  navigator.clipboard.writeText(code).then(()=>{
    document.getElementById('btn-export').textContent='✅ Copiato!';
    document.getElementById('btn-export2').textContent='✅ Copiato!';
    setTimeout(()=>{
      document.getElementById('btn-export').textContent='📋 Esporta JSON';
      document.getElementById('btn-export2').textContent='📋 Copia codice JS';
    }, 2000);
  });
};

// Keyboard
window.addEventListener('keydown', e=>{
  if(e.key==='Delete' || e.key==='Backspace'){
    if(selectedId && document.activeElement.tagName!=='INPUT' && document.activeElement.tagName!=='TEXTAREA'){
      deleteZone(selectedId);
    }
  }
  // Double-click label rename via prompt
});

// Double-click to rename
document.getElementById('colliders-layer').addEventListener('dblclick', e=>{
  const col = e.target.closest('.collider');
  if(!col) return;
  const id = parseInt(col.dataset.id);
  const z = zones.find(z=>z.id===id);
  const newName = prompt('Rinomina zona:', z.label);
  if(newName && newName.trim()){
    z.label = newName.trim();
    col.querySelector('.lbl').textContent = z.label;
    updateSidebar();
  }
});

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
window.addEventListener('load', ()=>{
  centerCamera();
  // Auto-load defaults
  DEFAULT_ZONES.forEach(z=>{ const id=++idCounter; zones.push({id,...z}); });
  renderAllZones();
  updateSidebar();
});
window.addEventListener('resize', centerCamera);
</script>
</body>
</html>
