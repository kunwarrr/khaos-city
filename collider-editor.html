<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Collider Editor — Khaos City</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#eee;font-family:monospace;overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* ── TOOLBAR ── */
#toolbar{
  height:48px;background:#1a1a1a;border-bottom:1px solid #333;
  display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;flex-wrap:nowrap;overflow-x:auto;
}
.tb-title{font-size:14px;font-weight:bold;color:#ff4444;letter-spacing:2px;text-transform:uppercase;white-space:nowrap}
.tb-btn{
  background:#2a2a2a;border:1px solid #444;color:#ddd;padding:5px 12px;
  border-radius:6px;cursor:pointer;font-family:monospace;font-size:12px;
  transition:background .15s,border-color .15s;white-space:nowrap;flex-shrink:0;
}
.tb-btn:hover{background:#3a3a3a;border-color:#666}
.tb-btn.active{background:#1a2a3a;border-color:#4af;color:#4af}
.tb-btn.danger{border-color:#ff4444;color:#ff4444}
.tb-btn.danger:hover{background:#3a1010}
.tb-btn.primary{background:#1a3a1a;border-color:#3fe89a;color:#3fe89a}
.tb-btn.primary:hover{background:#2a4a2a}
.tb-sep{width:1px;height:28px;background:#333;margin:0 2px;flex-shrink:0}
.tb-hint{font-size:11px;color:#555;padding:4px 8px;background:#161616;border-radius:4px;border:1px solid #2a2a2a;white-space:nowrap;flex-shrink:0}

/* ── MAIN AREA ── */
#main{flex:1;display:flex;overflow:hidden}

/* ── VIEWPORT ── */
#viewport{
  flex:1;overflow:hidden;position:relative;
  background:#0d0d0d;
}
#canvas-wrap{
  position:absolute;transform-origin:0 0;
}
#map-img{display:block;image-rendering:pixelated;user-select:none;pointer-events:none}

/* ── SVG OVERLAY ── */
#svg-layer{
  position:absolute;inset:0;overflow:visible;pointer-events:none;
}
.poly-fill{
  fill:rgba(255,40,40,0.28);
  stroke:rgba(255,70,70,0.9);
  stroke-width:2;
  cursor:move;
  pointer-events:all;
  transition:fill .15s;
}
.poly-fill:hover{fill:rgba(255,80,80,0.4)}
.poly-fill.selected{
  fill:rgba(255,160,40,0.35);
  stroke:rgba(255,200,50,1);
  stroke-width:2.5;
}
.poly-vertex{
  fill:#ff4;stroke:#000;stroke-width:1;
  cursor:move;pointer-events:all;r:6;
  transition:fill .1s;
}
.poly-vertex:hover{fill:#fff}
.poly-vertex.selected{fill:#f80;stroke:#ff0;stroke-width:1.5}
.poly-midpoint{
  fill:rgba(200,200,200,0.5);stroke:rgba(255,255,255,0.4);stroke-width:1;
  cursor:crosshair;pointer-events:all;r:4;
}
.poly-midpoint:hover{fill:rgba(255,255,200,0.8)}
/* drawing preview line */
.draw-preview{stroke:rgba(255,180,50,0.7);stroke-width:2;stroke-dasharray:6 4;fill:none;pointer-events:none}
.draw-dot{fill:#ffb020;stroke:#fff;stroke-width:1;pointer-events:none;r:5}
.draw-close-hint{fill:#0f0;stroke:#060;stroke-width:1;r:7;cursor:pointer;pointer-events:all}

/* ── SIDEBAR ── */
#sidebar{
  width:260px;background:#161616;border-left:1px solid #2a2a2a;
  display:flex;flex-direction:column;overflow:hidden;
}
#sidebar-hdr{padding:10px 12px;border-bottom:1px solid #2a2a2a;font-size:11px;color:#888;letter-spacing:1px;text-transform:uppercase}
#zone-list{flex:1;overflow-y:auto;padding:6px}
.zone-item{
  display:flex;align-items:center;gap:6px;padding:5px 8px;
  border-radius:5px;cursor:pointer;font-size:11px;
  border:1px solid transparent;margin-bottom:3px;
  transition:background .1s;
}
.zone-item:hover{background:#222}
.zone-item.selected{background:#2a1a1a;border-color:#ff4444}
.zone-dot{width:8px;height:8px;background:#ff4444;border-radius:50%;flex-shrink:0}
.zone-dot.selected{background:#ffaa00}
.zone-coords{font-size:10px;color:#555;margin-left:auto;white-space:nowrap}
.zone-del{background:none;border:none;color:#444;cursor:pointer;font-size:13px;padding:0 2px;transition:color .1s}
.zone-del:hover{color:#ff4444}

#export-area{
  border-top:1px solid #2a2a2a;padding:10px;
}
#export-out{
  width:100%;height:120px;background:#0d0d0d;border:1px solid #2a2a2a;
  color:#3fe89a;font-family:monospace;font-size:10px;padding:8px;
  border-radius:5px;resize:none;
}
#coords-display{
  padding:8px 12px;background:#111;border-top:1px solid #222;
  font-size:10px;color:#555;line-height:1.8;
}
#coords-display span{color:#aaa}
#mode-indicator{
  padding:6px 12px;background:#0d1a0d;border-top:1px solid #1a3a1a;
  font-size:11px;color:#3fe89a;letter-spacing:1px;font-weight:bold;
  min-height:28px;
}
</style>

function rectToPoly(r){
  return [
    {x:r.x,       y:r.y},
    {x:r.x+r.w,   y:r.y},
    {x:r.x+r.w,   y:r.y+r.h},
    {x:r.x,       y:r.y+r.h},
  ];
}

// ══════════════════════════════════════════
// CAMERA
// ══════════════════════════════════════════
function applyCamera(){
  const wrap = document.getElementById('canvas-wrap');
  wrap.style.transform = `translate(${cam.x}px,${cam.y}px) scale(${cam.scale})`;
}

function centerCamera(){
  const vp = document.getElementById('viewport');
  const vw = vp.clientWidth, vh = vp.clientHeight;
  const s = Math.min(vw/MAP_W, vh/MAP_H) * 0.97;
  cam.scale = s;
  cam.x = (vw - MAP_W*s)/2;
  cam.y = (vh - MAP_H*s)/2;
  applyCamera();
  resizeSVG();
}

function resizeSVG(){
  const svg = document.getElementById('svg-layer');
  svg.setAttribute('width',  MAP_W);
  svg.setAttribute('height', MAP_H);
  svg.setAttribute('viewBox', `0 0 ${MAP_W} ${MAP_H}`);
}

// ══════════════════════════════════════════
// COORD HELPERS
// ══════════════════════════════════════════
// Client → % coords (accounting for camera transform)
function clientToPct(cx, cy){
  const vp = document.getElementById('viewport');
  const rect = vp.getBoundingClientRect();
  const mx = (cx - rect.left - cam.x) / cam.scale;
  const my = (cy - rect.top  - cam.y) / cam.scale;
  return { x: (mx/MAP_W)*100, y: (my/MAP_H)*100 };
}

// % → SVG user units
function pctToSVG(px, py){
  return { x: (px/100)*MAP_W, y: (py/100)*MAP_H };
}

function ptsToSVGPoints(pts){
  return pts.map(p=>{ const s=pctToSVG(p.x,p.y); return `${s.x},${s.y}`; }).join(' ');
}

// ══════════════════════════════════════════
// POLYGON MANAGEMENT
// ══════════════════════════════════════════
function addPoly(label, pts){
  const id = ++idCounter;
  polys.push({ id, label: label||`zona_${id}`, pts: pts.map(p=>({x:+p.x.toFixed(2),y:+p.y.toFixed(2)})) });
  renderAll();
  selectPoly(id);
  updateSidebar();
  return id;
}

function deletePoly(id){
  polys = polys.filter(p=>p.id!==id);
  if(selectedId===id) selectedId=null;
  renderAll();
  updateSidebar();
  updateCoordsDisplay(null);
}

function selectPoly(id){
  selectedId = id;
  renderAll();
  document.querySelectorAll('.zone-item').forEach(el=>{
    el.classList.toggle('selected', parseInt(el.dataset.id)===id);
    el.querySelector('.zone-dot').classList.toggle('selected', parseInt(el.dataset.id)===id);
  });
  const p = polys.find(p=>p.id===id);
  if(p) updateCoordsDisplay(p);
}

// ══════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════
function renderAll(){
  const svg = document.getElementById('svg-layer');
  // Remove everything except draw-preview group
  Array.from(svg.children).forEach(c=>{ if(c.id!=='draw-group') c.remove(); });

  for(const poly of polys){
    const sel = poly.id === selectedId;
    const g = document.createElementNS(SVG_NS,'g');
    g.dataset.id = poly.id;

    // Polygon shape
    const shape = document.createElementNS(SVG_NS,'polygon');
    shape.setAttribute('points', ptsToSVGPoints(poly.pts));
    shape.classList.add('poly-fill');
    if(sel) shape.classList.add('selected');
    shape.addEventListener('mousedown', e=>{ if(mode==='select'){ e.stopPropagation(); selectPoly(poly.id); startMovePoly(e, poly.id); } });
    shape.addEventListener('click', e=>{ if(mode==='select'){ e.stopPropagation(); selectPoly(poly.id); } });
    g.appendChild(shape);

    // Label text (centroid)
    const cx = poly.pts.reduce((s,p)=>s+p.x,0)/poly.pts.length;
    const cy = poly.pts.reduce((s,p)=>s+p.y,0)/poly.pts.length;
    const sc = pctToSVG(cx,cy);
    const lbl = document.createElementNS(SVG_NS,'text');
    lbl.setAttribute('x', sc.x); lbl.setAttribute('y', sc.y);
    lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('dominant-baseline','middle');
    lbl.setAttribute('font-size','10'); lbl.setAttribute('fill','rgba(255,200,200,0.9)');
    lbl.setAttribute('pointer-events','none');
    lbl.textContent = poly.label;
    g.appendChild(lbl);

    // Vertex handles & midpoints (only when selected)
    if(sel && mode==='select'){
      poly.pts.forEach((pt, i)=>{
        const sv = pctToSVG(pt.x, pt.y);
        const v = document.createElementNS(SVG_NS,'circle');
        v.setAttribute('cx', sv.x); v.setAttribute('cy', sv.y); v.setAttribute('r',6);
        v.classList.add('poly-vertex', 'selected');
        v.addEventListener('mousedown', e=>{ e.stopPropagation(); startMoveVertex(e, poly.id, i); });
        v.addEventListener('dblclick', e=>{ e.stopPropagation(); removeVertex(poly.id, i); });
        g.appendChild(v);
      });

      // Midpoints for inserting vertices
      poly.pts.forEach((pt, i)=>{
        const next = poly.pts[(i+1)%poly.pts.length];
        const mx = (pt.x+next.x)/2, my = (pt.y+next.y)/2;
        const sm = pctToSVG(mx,my);
        const m = document.createElementNS(SVG_NS,'circle');
        m.setAttribute('cx', sm.x); m.setAttribute('cy', sm.y); m.setAttribute('r',4);
        m.classList.add('poly-midpoint');
        m.title = 'Click per inserire vertice';
        m.addEventListener('mousedown', e=>{ e.stopPropagation(); insertVertex(poly.id, i, {x:mx,y:my}); });
        g.appendChild(m);
      });
    }

    svg.appendChild(g);
  }
  updateModeIndicator();
}

// ══════════════════════════════════════════
// DRAW GROUP (pen preview)
// ══════════════════════════════════════════
function getOrCreateDrawGroup(){
  let g = document.getElementById('draw-group');
  if(!g){ g = document.createElementNS(SVG_NS,'g'); g.id='draw-group'; document.getElementById('svg-layer').appendChild(g); }
  g.innerHTML = '';
  return g;
}

function updateDrawPreview(mousePos){
  const g = getOrCreateDrawGroup();
  const pts = drawing.pts;
  if(pts.length === 0) return;

  // Filled polygon preview
  if(pts.length >= 3){
    const preview = document.createElementNS(SVG_NS,'polygon');
    preview.setAttribute('points', ptsToSVGPoints(pts));
    preview.setAttribute('fill','rgba(255,140,30,0.18)');
    preview.setAttribute('stroke','none');
    preview.setAttribute('pointer-events','none');
    g.appendChild(preview);
  }

  // Lines between placed points
  for(let i=1;i<pts.length;i++){
    const a=pctToSVG(pts[i-1].x,pts[i-1].y), b=pctToSVG(pts[i].x,pts[i].y);
    const line = document.createElementNS(SVG_NS,'line');
    line.setAttribute('x1',a.x); line.setAttribute('y1',a.y);
    line.setAttribute('x2',b.x); line.setAttribute('y2',b.y);
    line.classList.add('draw-preview');
    g.appendChild(line);
  }

  // Line from last point to mouse
  if(mousePos && pts.length >= 1){
    const last = pctToSVG(pts[pts.length-1].x, pts[pts.length-1].y);
    const cur  = pctToSVG(mousePos.x, mousePos.y);
    const line = document.createElementNS(SVG_NS,'line');
    line.setAttribute('x1',last.x); line.setAttribute('y1',last.y);
    line.setAttribute('x2',cur.x);  line.setAttribute('y2',cur.y);
    line.classList.add('draw-preview');
    g.appendChild(line);

    // Close hint: closing line if >= 3 pts
    if(pts.length>=3){
      const first = pctToSVG(pts[0].x, pts[0].y);
      const cl = document.createElementNS(SVG_NS,'line');
      cl.setAttribute('x1',cur.x); cl.setAttribute('y1',cur.y);
      cl.setAttribute('x2',first.x); cl.setAttribute('y2',first.y);
      cl.setAttribute('stroke','rgba(0,255,60,0.4)');
      cl.setAttribute('stroke-width','1.5');
      cl.setAttribute('stroke-dasharray','4 4');
      cl.setAttribute('fill','none');
      cl.setAttribute('pointer-events','none');
      g.appendChild(cl);
    }
  }

  // Placed point dots
  pts.forEach((pt, i)=>{
    const sv = pctToSVG(pt.x, pt.y);
    const c = document.createElementNS(SVG_NS,'circle');
    c.setAttribute('cx', sv.x); c.setAttribute('cy', sv.y); c.setAttribute('r', i===0 && pts.length>=3 ? 8 : 5);
    c.classList.add(i===0 && pts.length>=3 ? 'draw-close-hint' : 'draw-dot');
    c.setAttribute('pointer-events', i===0 && pts.length>=3 ? 'all':'none');
    if(i===0 && pts.length>=3){
      c.addEventListener('click', e=>{ e.stopPropagation(); closePoly(); });
    }
    g.appendChild(c);
  });

  // Point count badge
  if(pts.length>0){
    const sv = pctToSVG(pts[pts.length-1].x, pts[pts.length-1].y);
    const txt = document.createElementNS(SVG_NS,'text');
    txt.setAttribute('x', sv.x+10); txt.setAttribute('y', sv.y-8);
    txt.setAttribute('font-size','11'); txt.setAttribute('fill','#ffb020');
    txt.setAttribute('pointer-events','none');
    txt.textContent = `${pts.length} pt${pts.length>1?'i':'o'}`;
    g.appendChild(txt);
  }
}

function clearDrawPreview(){
  const g = document.getElementById('draw-group');
  if(g) g.innerHTML='';
}

// ══════════════════════════════════════════
// PEN ACTIONS
// ══════════════════════════════════════════
function startDrawing(){ drawing.active=true; drawing.pts=[]; clearDrawPreview(); }
function cancelDrawing(){ drawing.active=false; drawing.pts=[]; clearDrawPreview(); }

function addDrawPoint(pt){
  if(!drawing.active) startDrawing();
  // Snap to first point if close enough (close polygon)
  if(drawing.pts.length>=3){
    const first = drawing.pts[0];
    const dx = pt.x - first.x, dy = pt.y - first.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if(dist < 1.5){ closePoly(); return; }
  }
  drawing.pts.push({x:+pt.x.toFixed(2), y:+pt.y.toFixed(2)});
  updateDrawPreview(pt);
}

function closePoly(){
  if(drawing.pts.length < 3){ cancelDrawing(); return; }
  const id = addPoly(null, drawing.pts);
  cancelDrawing();
  setMode('pen');
}

// ══════════════════════════════════════════
// VERTEX EDITING
// ══════════════════════════════════════════
function removeVertex(polyId, idx){
  const p = polys.find(p=>p.id===polyId);
  if(!p || p.pts.length<=3) return; // keep minimum 3
  p.pts.splice(idx,1);
  renderAll();
}

function insertVertex(polyId, afterIdx, pt){
  const p = polys.find(p=>p.id===polyId);
  if(!p) return;
  p.pts.splice(afterIdx+1, 0, {x:+pt.x.toFixed(2), y:+pt.y.toFixed(2)});
  renderAll();
}

// ══════════════════════════════════════════
// DRAG (SELECT MODE)
// ══════════════════════════════════════════
function startMovePoly(e, id){
  const p = polys.find(p=>p.id===id);
  const mp = clientToPct(e.clientX, e.clientY);
  dragState = { type:'move', id, sx:mp.x, sy:mp.y, origPts: p.pts.map(pt=>({...pt})) };
}

function startMoveVertex(e, id, idx){
  dragState = { type:'vertex', id, idx };
}

let lastMouse = null;

// ══════════════════════════════════════════
// SIDEBAR
// ══════════════════════════════════════════
function updateSidebar(){
  document.getElementById('zone-count').textContent = polys.length;
  const list = document.getElementById('zone-list');
  list.innerHTML = polys.map(p=>`
    <div class="zone-item ${p.id===selectedId?'selected':''}" data-id="${p.id}" onclick="selectPoly(${p.id})">
      <div class="zone-dot ${p.id===selectedId?'selected':''}"></div>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.label}</span>
      <span class="zone-coords">${p.pts.length}pt</span>
      <button class="zone-del" onclick="event.stopPropagation();deletePoly(${p.id})">✕</button>
    </div>
  `).join('');
}

function updateCoordsDisplay(p){
  if(!p){ document.getElementById('cd-pts').textContent='—'; document.getElementById('cd-area').textContent='—'; return; }
  document.getElementById('cd-pts').textContent = p.pts.length;
  // Shoelace area in % units
  let area = 0;
  for(let i=0;i<p.pts.length;i++){
    const a=p.pts[i], b=p.pts[(i+1)%p.pts.length];
    area += a.x*b.y - b.x*a.y;
  }
  document.getElementById('cd-area').textContent = Math.abs(area/2).toFixed(1);
}

function updateModeIndicator(){
  const el = document.getElementById('mode-indicator');
  if(!el) return;
  if(mode==='pen'){
    if(drawing.active && drawing.pts.length>0){
      el.textContent = `✏️ DISEGNO — ${drawing.pts.length} punti · Invio/doppio-click = chiudi · Esc = annulla`;
    } else {
      el.textContent = '✏️ Modalità: PENNA — click per iniziare';
    }
  } else {
    el.textContent = '↖ Modalità: SELEZIONA — click su un poligono';
  }
}

// ══════════════════════════════════════════
// MODE TOGGLE
// ══════════════════════════════════════════
function setMode(m){
  if(m==='pen' && drawing.active && drawing.pts.length>0){
    // don't discard current drawing just by switching
  } else if(m!=='pen'){
    cancelDrawing();
  }
  mode = m;
  document.getElementById('btn-pen').classList.toggle('active', m==='pen');
  document.getElementById('btn-select').classList.toggle('active', m==='select');
  document.getElementById('viewport').style.cursor = m==='pen' ? 'crosshair' : 'default';
  const hints = {
    pen:'Click = aggiungi punto · Doppio-click / Invio = chiudi · Esc = annulla',
    select:'Click = seleziona · Trascina = sposta · Doppio-click vertice = rimuovi'
  };
  document.getElementById('toolbar-hint').textContent = hints[m];
  renderAll();
  updateModeIndicator();
}

// ══════════════════════════════════════════
// VIEWPORT EVENTS
// ══════════════════════════════════════════
const vp = document.getElementById('viewport');

vp.addEventListener('mousedown', e=>{
  if(e.button===1 || e.button===2 || e.altKey){
    dragState = { type:'cam', sx:e.clientX, sy:e.clientY, cx:cam.x, cy:cam.y };
    e.preventDefault(); return;
  }
  if(mode==='pen' && e.button===0){
    const mp = clientToPct(e.clientX, e.clientY);
    addDrawPoint(mp);
    e.preventDefault();
  }
  // select mode handled by shape listeners
});

vp.addEventListener('dblclick', e=>{
  if(mode==='pen'){
    closePoly();
    e.preventDefault();
  }
});

window.addEventListener('mousemove', e=>{
  const mp = clientToPct(e.clientX, e.clientY);
  lastMouse = mp;

  if(dragState){
    if(dragState.type==='cam'){
      cam.x = dragState.cx + (e.clientX - dragState.sx);
      cam.y = dragState.cy + (e.clientY - dragState.sy);
      applyCamera();
    } else if(dragState.type==='move'){
      const p = polys.find(p=>p.id===dragState.id);
      const dx=mp.x-dragState.sx, dy=mp.y-dragState.sy;
      p.pts = dragState.origPts.map(pt=>({
        x:+Math.max(0,Math.min(100,pt.x+dx)).toFixed(2),
        y:+Math.max(0,Math.min(100,pt.y+dy)).toFixed(2)
      }));
      renderAll();
      updateCoordsDisplay(p);
    } else if(dragState.type==='vertex'){
      const p = polys.find(p=>p.id===dragState.id);
      p.pts[dragState.idx] = {x:+Math.max(0,Math.min(100,mp.x)).toFixed(2), y:+Math.max(0,Math.min(100,mp.y)).toFixed(2)};
      renderAll();
      updateCoordsDisplay(p);
    }
    return;
  }

  if(mode==='pen' && drawing.active){
    updateDrawPreview(mp);
  }
});

window.addEventListener('mouseup', e=>{
  if(dragState && (dragState.type==='move'||dragState.type==='vertex')){
    updateSidebar();
  }
  dragState = null;
});

vp.addEventListener('wheel', e=>{
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.09 : 0.09;
  const newScale = Math.max(0.15, Math.min(8, cam.scale+delta));
  const rect = vp.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  cam.x = mx - (mx - cam.x)*(newScale/cam.scale);
  cam.y = my - (my - cam.y)*(newScale/cam.scale);
  cam.scale = newScale;
  applyCamera();
},{passive:false});

vp.addEventListener('contextmenu', e=>e.preventDefault());

// ══════════════════════════════════════════
// KEYBOARD
// ══════════════════════════════════════════
window.addEventListener('keydown', e=>{
  if(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='TEXTAREA') return;

  if(e.key==='Escape'){
    if(drawing.active){ cancelDrawing(); updateModeIndicator(); }
    else { selectedId=null; renderAll(); updateSidebar(); }
  }
  if(e.key==='Enter'){
    if(mode==='pen' && drawing.active && drawing.pts.length>=3){ closePoly(); }
  }
  if(e.key==='Delete'||e.key==='Backspace'){
    if(selectedId) deletePoly(selectedId);
  }
  if(e.key==='z'&&(e.ctrlKey||e.metaKey)){
    if(mode==='pen'&&drawing.active&&drawing.pts.length>0){
      drawing.pts.pop();
      updateDrawPreview(lastMouse);
      updateModeIndicator();
    }
  }
  if(e.key==='p'||e.key==='P') setMode('pen');
  if(e.key==='s'||e.key==='S') setMode('select');
});

// ══════════════════════════════════════════
// TOOLBAR BUTTONS
// ══════════════════════════════════════════
document.getElementById('btn-pen').onclick = ()=>setMode('pen');
document.getElementById('btn-select').onclick = ()=>setMode('select');

document.getElementById('btn-del-sel').onclick = ()=>{
  if(selectedId) deletePoly(selectedId);
};

document.getElementById('btn-clear').onclick = ()=>{
  if(!confirm('Eliminare tutti i poligoni?')) return;
  polys=[]; selectedId=null; cancelDrawing();
  renderAll(); updateSidebar(); updateCoordsDisplay(null);
};

document.getElementById('btn-load-default').onclick = ()=>{
  if(polys.length && !confirm('Sovrascrivere i poligoni esistenti?')) return;
  polys=[]; idCounter=0;
  DEFAULT_RECTS.forEach(r=>{
    const id=++idCounter;
    polys.push({id, label:r.label, pts:rectToPoly(r).map(p=>({x:+p.x.toFixed(1),y:+p.y.toFixed(1)}))});
  });
  selectedId=null; cancelDrawing();
  renderAll(); updateSidebar(); updateCoordsDisplay(null);
};

// ══════════════════════════════════════════
// DOUBLE-CLICK RENAME
// ══════════════════════════════════════════
document.getElementById('svg-layer').addEventListener('dblclick', e=>{
  if(mode!=='select') return;
  const g = e.target.closest('g[data-id]');
  if(!g) return;
  const id = parseInt(g.dataset.id);
  const p = polys.find(p=>p.id===id);
  if(!p) return;
  if(e.target.classList.contains('poly-vertex')) return; // vertex dblclick = remove
  const newName = prompt('Rinomina zona:', p.label);
  if(newName && newName.trim()){ p.label=newName.trim(); renderAll(); updateSidebar(); }
});

// ══════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════
function buildExport(){
  const lines = polys.map(p=>{
    const ptsStr = p.pts.map(pt=>`{x:${pt.x},y:${pt.y}}`).join(',');
    return `  { label:'${p.label}', pts:[${ptsStr}] },`;
  }).join('\n');
  return `// Point-in-polygon collision (use isWalkable from index.html)\nconst WALKABLE_ZONES = [\n${lines}\n];\n\n// Helper (paste in index.html):\n// function pointInPoly(px,py,pts){\n//   let inside=false;\n//   for(let i=0,j=pts.length-1;i<pts.length;j=i++){\n//     if((pts[i].y>py)!==(pts[j].y>py)&&px<(pts[j].x-pts[i].x)*(py-pts[i].y)/(pts[j].y-pts[i].y)+pts[i].x) inside=!inside;\n//   }\n//   return inside;\n// }\n// function isWalkable(px,py){ return WALKABLE_ZONES.some(z=>pointInPoly(px,py,z.pts)); }`;
}

document.getElementById('btn-export').onclick =
document.getElementById('btn-export2').onclick = ()=>{
  const code = buildExport();
  document.getElementById('export-out').value = code;
  navigator.clipboard.writeText(code).catch(()=>{});
  ['btn-export','btn-export2'].forEach(id=>{
    const b=document.getElementById(id);
    const orig=b.textContent;
    b.textContent='✅ Copiato!';
    setTimeout(()=>b.textContent=orig,2000);
  });
};

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
window.addEventListener('load', ()=>{
  resizeSVG();
  centerCamera();
  // Load defaults as polygons
  DEFAULT_RECTS.forEach(r=>{
    const id=++idCounter;
    polys.push({id, label:r.label, pts:rectToPoly(r).map(p=>({x:+p.x.toFixed(1),y:+p.y.toFixed(1)}))});
  });
  renderAll();
  updateSidebar();
  setMode('pen');
});
window.addEventListener('resize', ()=>{ centerCamera(); });
</script>
